<!DOCTYPE html>
<html>
<head>
  <title>FoxChat Sign Up</title>
  <style>
    body {
      font-family: 'Segoe UI', 'Noto Sans', sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      background: #f4f4f4;
    }
    
    button {
	    font-family: 'Segoe UI', 'Noto Sans', sans-serif;
      background: white;
      border: 2px solid #FF00D4;
	    border-radius: 10px;
      padding: 8px 12px;
      margin: 5px 0;
      cursor: pointer;
    }

    #loginBox {
      margin: auto;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="loginBox">
    <h2>Sign Up</h2>
    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="signup()">Sign Up</button>
    <p id="loginError" style="color:red;"></p>
  </div>
  <div id="app">
    <h1>Redirecting...</h1>
  </div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAawsOKus-CthFY21RXTiFfSqwN2H-QQ_0",
    authDomain: "foxchat-21085.firebaseapp.com",
    projectId: "foxchat-21085",
    storageBucket: "foxchat-21085.firebasestorage.app",
    messagingSenderId: "583562801855",
    appId: "1:583562801855:web:c49f4183c611ab9c53cc0a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const loginBox = document.getElementById("loginBox");
const appDiv = document.getElementById("app");

window.signup = function() {
  createUserWithEmailAndPassword(
    auth,
    username.value + "@foxchat.co.uk",
    password.value
  ).catch(err => loginError.innerText = err.message);
}

onAuthStateChanged(auth, async user => {
  if (user) {
    loginBox.style.display = "none";
    appDiv.style.display = "flex";
    window.location.href = "/FoxChat/";
  } else {
    loginBox.style.display = "block";
    appDiv.style.display = "none";
  }
});
</script>
</body>
</html>
