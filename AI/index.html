<!DOCTYPE html>
<html>
<head>
  <title>BoshaBot 🤖</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1a1a1a;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #333;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 15px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .bot {
      align-self: flex-start;
      background: #2a2a2a;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #1a1a1a;
      border-top: 1px solid #333;
    }

    #msg {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #2a2a2a;
      color: white;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

<header>🤖 BoshaBot</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="msg" placeholder="Ask BoshaBot..." onkeydown="if(event.key==='Enter') send()">
  <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// Fake AI responses (you can upgrade later)
function fakeAI(message) {
  const replies = [
    "Interesting 🤔",
    "Tell me more!",
    "I think that's a great idea 😄",
    "Hmm... I'm not sure about that 😅",
    "That reminds me of something cool!",
    "You're onto something there 👀"
  ];

  return replies[Math.floor(Math.random() * replies.length)];
}

function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  // typing effect
  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.textContent = "BoshaBot is typing...";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    typing.remove();
    addMessage(fakeAI(text), "bot");
  }, 800);
}
</script>

</body>
</html>
